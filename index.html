<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal MPU3212</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #e0e5ec; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .glass-neu { background: rgba(224, 229, 236, 0.9); backdrop-filter: blur(10px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.5); box-shadow: 20px 20px 60px #bec8d4, -20px -20px 60px #ffffff; width: 100%; max-width: 480px; padding: 30px; }
        .neu-input { width: 100%; background: #e0e5ec; border: none; border-radius: 12px; padding: 12px; box-shadow: inset 4px 4px 8px #b8bcc2, inset -4px -4px 8px #ffffff; outline: none; margin-bottom: 15px; font-weight: bold; }
        .btn-neu { width: 100%; padding: 15px; border-radius: 15px; background: #e0e5ec; box-shadow: 6px 6px 12px #b8bcc2, -6px -6px 12px #ffffff; font-weight: 900; color: #444; transition: 0.2s; }
        .btn-neu:active { box-shadow: inset 4px 4px 8px #b8bcc2, inset -4px -4px 8px #ffffff; transform: scale(0.98); }
        .profile-circle { width: 120px; height: 120px; border-radius: 50%; background: #e0e5ec; box-shadow: 8px 8px 16px #b8bcc2, -8px -8px 16px #ffffff; margin: 0 auto 20px; position: relative; overflow: hidden; border: 4px solid #e0e5ec; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="glass-neu text-center">
        <h1 class="text-3xl font-black mb-8 tracking-tighter">PORTAL PELAJAR</h1>
        <input type="text" id="ic-input" class="neu-input text-center" placeholder="MASUKKAN NO. IC">
        <button onclick="handleLogin()" id="btn-login" class="btn-neu !text-blue-600">MASUK</button>
    </div>

    <div id="main-dashboard" class="glass-neu hidden">
        <div class="text-center mb-6">
            <div class="profile-circle">
                <img id="user-img" src="" class="w-full h-full object-cover">
            </div>
            <button onclick="document.getElementById('file-up').click()" class="text-[10px] font-black underline mb-4">TUKAR GAMBAR</button>
            <h2 id="user-nama" class="text-xl font-black uppercase"></h2>
            <p id="user-kelas" class="text-blue-500 font-bold text-xs"></p>
        </div>

        <div class="max-h-[50vh] overflow-y-auto pr-2">
            <label class="text-[10px] font-black ml-2">JAWATAN</label><input type="text" id="in-jawatan" class="neu-input">
            <label class="text-[10px] font-black ml-2">KUMPULAN</label><input type="text" id="in-kumpulan" class="neu-input">
            <label class="text-[10px] font-black ml-2">NO KUMPULAN</label><input type="text" id="in-nokump" class="neu-input">
            <label class="text-[10px] font-black ml-2">ALAHAN</label><input type="text" id="in-alahan" class="neu-input">
            <label class="text-[10px] font-black ml-2">UBAT</label><input type="text" id="in-ubat" class="neu-input">
            <label class="text-[10px] font-black ml-2">TEL KECEMASAN</label><input type="text" id="in-tel" class="neu-input">
        </div>

        <input type="file" id="file-up" class="hidden" accept="image/*">
        <button onclick="handleUpdate()" id="btn-save" class="btn-neu !text-green-600 mt-5">SIMPAN DATA</button>
        <button onclick="location.reload()" class="w-full mt-4 text-[10px] font-black text-gray-400">KELUAR</button>
    </div>

    <script>
        // GANTIKAN DENGAN URL EXEC ANDA
        const API_URL = "https://script.google.com/macros/s/AKfycbyaXLnJtB8CCICRaSxYnA3OtQcZpgSdlZxBSQl9TGitnS2P2iaWwvT2IU_D749K2aT8/exec";
        let sessionData = null;

        async function handleLogin() {
            const ic = document.getElementById('ic-input').value;
            const btn = document.getElementById('btn-login');
            btn.innerText = "MEMPROSES...";
            
            try {
                const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({action: 'login_student', no_kp: ic}) });
                const d = await r.json();
                if(d.result === 'success') {
                    sessionData = d.data;
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-dashboard').classList.remove('hidden');
                    loadFields();
                } else { alert(d.message); }
            } catch(e) { alert("Ralat API. Pastikan Deployment Anyone."); }
            btn.innerText = "MASUK";
        }

        function loadFields() {
            document.getElementById('user-nama').innerText = sessionData.nama;
            document.getElementById('user-kelas').innerText = sessionData.kelas;
            document.getElementById('user-img').src = sessionData.url_gambar || "https://via.placeholder.com/150";
            document.getElementById('in-jawatan').value = sessionData.jawatan || "";
            document.getElementById('in-kumpulan').value = sessionData.kumpulan || "";
            document.getElementById('in-nokump').value = sessionData.no_kumpulan || "";
            document.getElementById('in-alahan').value = sessionData.alahan || "";
            document.getElementById('in-ubat').value = sessionData.ubat || "";
            document.getElementById('in-tel').value = sessionData.tel_kecemasan || "";
        }

        async function handleUpdate() {
            const btn = document.getElementById('btn-save');
            btn.innerText = "SEDANG MENYIMPAN...";
            
            const payload = {
                action: 'update_student_all',
                no_kp: sessionData.no_kp,
                jawatan: document.getElementById('in-jawatan').value,
                kumpulan: document.getElementById('in-kumpulan').value,
                no_kumpulan: document.getElementById('in-nokump').value,
                alahan: document.getElementById('in-alahan').value,
                ubat: document.getElementById('in-ubat').value,
                tel_kecemasan: document.getElementById('in-tel').value,
                image_base64: null
            };

            const file = document.getElementById('file-up').files[0];
            if(file) {
                const reader = new FileReader();
                const b64 = await new Promise(res => {
                    reader.onload = () => res(reader.result);
                    reader.readAsDataURL(file);
                });
                payload.image_base64 = b64;
            }

            try {
                const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const d = await r.json();
                if(d.result === 'success') {
                    alert("Berjaya Disimpan!");
                    if(d.new_url) document.getElementById('user-img').src = d.new_url;
                } else { alert(d.message); }
            } catch(e) { alert("Gagal Simpan."); }
            btn.innerText = "SIMPAN DATA";
        }
    </script>
</body>
</html>
