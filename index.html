<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal MPU3212 | GitHub Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #e0e5ec;
            --accent: #ff3e00;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        /* Neubrutalism + Glassmorphism */
        .main-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 4px solid #000;
            box-shadow: 12px 12px 0px #000;
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            border-radius: 4px;
        }

        /* Neumorphism Input */
        .neu-input {
            background: #e0e5ec;
            border: 2px solid #000;
            box-shadow: inset 5px 5px 10px #b8bcc2, inset -5px -5px 10px #ffffff;
            padding: 15px;
            width: 100%;
            font-weight: bold;
            outline: none;
            margin-bottom: 1.5rem;
            border-radius: 8px;
        }

        /* Brutalist Button */
        .btn-action {
            background: #000;
            color: #fff;
            padding: 15px;
            width: 100%;
            font-weight: 900;
            text-transform: uppercase;
            border: 2px solid #000;
            box-shadow: 6px 6px 0px var(--accent);
            cursor: pointer;
            transition: 0.1s;
        }

        .btn-action:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--accent);
        }

        .loader {
            width: 24px; height: 24px;
            border: 4px solid #FFF; border-bottom-color: transparent;
            border-radius: 50%; display: inline-block;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
        
        .hidden { display: none !important; }
        .tab-active { border-bottom: 6px solid #000; color: #000; font-weight: 900; }
    </style>
</head>
<body>

    <div id="login-container" class="main-card">
        <h1 class="text-5xl font-black uppercase tracking-tighter leading-none mb-8">MPU<br>3212</h1>
        
        <div class="flex gap-4 mb-8">
            <button onclick="setTab('student')" id="tab-student" class="flex-1 pb-2 text-sm uppercase tab-active">Pelajar</button>
            <button onclick="setTab('staff')" id="tab-staff" class="flex-1 pb-2 text-sm uppercase text-gray-400">Pensyarah</button>
        </div>

        <div id="form-student">
            <label class="block text-[10px] font-black uppercase mb-1">Carian No. KP</label>
            <input type="text" id="kp-student" class="neu-input" placeholder="010409020015">
            <button onclick="loginStudent()" id="btn-std" class="btn-action">Masuk Portal <i class="fas fa-bolt ml-2"></i></button>
        </div>

        <div id="form-staff" class="hidden">
            <input type="text" id="email-staff" class="neu-input" placeholder="Emel Pensyarah">
            <input type="password" id="pass-staff" class="neu-input" placeholder="Kata Laluan">
            <button onclick="loginStaff()" id="btn-stf" class="btn-action !bg-indigo-600">Log Masuk</button>
        </div>
    </div>

    <div id="dashboard-student" class="hidden main-card !max-w-xl">
        <div class="flex flex-col items-center">
            <div class="relative group mb-6">
                <div class="w-40 h-40 border-4 border-black shadow-[8px_8px_0px_#000] overflow-hidden bg-white">
                    <img id="std-img" src="" class="w-full h-full object-cover">
                </div>
                <button onclick="document.getElementById('file-upload').click()" class="absolute -bottom-2 -right-2 bg-yellow-400 border-2 border-black p-3 hover:scale-110 transition">
                    <i class="fas fa-camera"></i>
                </button>
            </div>
            
            <h2 id="std-nama" class="text-3xl font-black uppercase leading-tight mb-1 text-center">NAMA</h2>
            <p id="std-kelas" class="font-bold text-indigo-600 mb-6 uppercase tracking-widest"></p>
            
            <input type="file" id="file-upload" accept="image/*" class="hidden" onchange="uploadImage()">
            <div id="upload-status" class="text-xs font-black uppercase mb-4"></div>

            <button onclick="location.reload()" class="w-full border-4 border-black py-2 font-black uppercase hover:bg-black hover:text-white transition">Keluar</button>
        </div>
    </div>

    <script>
        // PENTING: GANTIKAN DENGAN URL APPS SCRIPT ANDA
        const SCRIPT_URL = "GANTIKAN_URL_WEB_APP_DI_SINI"; 

        function setTab(mode) {
            const isStd = mode === 'student';
            document.getElementById('form-student').classList.toggle('hidden', !isStd);
            document.getElementById('form-staff').classList.toggle('hidden', isStd);
            document.getElementById('tab-student').className = isStd ? "flex-1 pb-2 text-sm uppercase tab-active" : "flex-1 pb-2 text-sm uppercase text-gray-400";
            document.getElementById('tab-staff').className = !isStd ? "flex-1 pb-2 text-sm uppercase tab-active" : "flex-1 pb-2 text-sm uppercase text-gray-400";
        }

        let currentNoKp = "";

        async function loginStudent() {
            const kp = document.getElementById('kp-student').value;
            const btn = document.getElementById('btn-std');
            if(!kp) return alert("Sila isi No. KP");

            btn.innerHTML = '<span class="loader"></span>';
            btn.disabled = true;

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "login_student", no_kp: kp })
                });
                const res = await response.json();
                
                if(res.result === "success") {
                    currentNoKp = res.data.no_kp;
                    document.getElementById('login-container').classList.add('hidden');
                    document.getElementById('dashboard-student').classList.remove('hidden');
                    document.getElementById('std-nama').innerText = res.data.nama;
                    document.getElementById('std-kelas').innerText = res.data.kelas;
                    document.getElementById('std-img').src = res.data.url_gambar || "https://via.placeholder.com/400?text=TIADA+GAMBAR";
                } else {
                    alert(res.message);
                }
            } catch (e) {
                alert("Ralat sambungan API.");
            } finally {
                btn.innerHTML = 'Masuk Portal <i class="fas fa-bolt ml-2"></i>';
                btn.disabled = false;
            }
        }

        function uploadImage() {
            const file = document.getElementById('file-upload').files[0];
            const status = document.getElementById('upload-status');
            if(!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                document.getElementById('std-img').src = e.target.result;
                status.innerHTML = "<span class='text-blue-600'>Memuat naik...</span>";
                
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            action: "update_student_info", 
                            no_kp: currentNoKp, 
                            image_base64: e.target.result 
                        })
                    });
                    const res = await response.json();
                    status.innerHTML = res.result === "success" ? "<span class='text-green-600'>Berjaya!</span>" : "<span class='text-red-600'>Gagal</span>";
                } catch (err) {
                    status.innerHTML = "Ralat!";
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
